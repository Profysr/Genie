services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: jcn_db
      POSTGRES_USER: jcn_user
      POSTGRES_PASSWORD: jcn_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    restart: always
    command: celery -A core worker --loglevel=info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  media_data:
  redis_data:
